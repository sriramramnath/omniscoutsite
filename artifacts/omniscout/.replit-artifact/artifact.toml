kind = "web"
previewPath = "/"
title = "OmniScout"
version = "1.0.0"
id = "artifacts/omniscout"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22294

[services.development]
run = "pnpm --filter @workspace/omniscout run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniscout", "run", "build" ]
publicDir = "artifacts/omniscout/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22294"
BASE_PATH = "/"
